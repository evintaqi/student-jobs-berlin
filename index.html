<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Berlin Student Jobs</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 700px;
      margin: 100px auto;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      color: gray;
      margin-bottom: 30px;
      font-size: 18px;
    }

    input, select {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>
      Finde Werkstudentenjobs in Berlin.
    </h1>

    <p>
      Trag dich ein und erhalte innerhalb von 48h passende Jobmöglichkeiten.
    </p>

    <form>

      <input type="text" placeholder="Vorname">

      <input type="email" placeholder="E-Mail">

      <input type="text" placeholder="Studiengang">

      <select>
        <option>Was suchst du?</option>
        <option>Werkstudentenjob</option>
        <option>Praktikum</option>
        <option>Teilzeitjob</option>
      </select>

      <button>
        Kostenlos bewerben
      </button>

    </form>

  </div>

</body>

</html>
