<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Berlin Student Jobs</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 15px;
      line-height: 1.1;
    }

    p {
      color: gray;
      margin-bottom: 35px;
      font-size: 18px;
      line-height: 1.5;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 16px;
      margin-bottom: 18px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 18px;
      background: black;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    .label {
      margin-bottom: 8px;
      font-weight: bold;
      display: block;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>
      Finde Studentenjobs in Berlin.
    </h1>

    <p>
      Trag dich ein und erhalte innerhalb von 48h passende Jobmöglichkeiten für Praktika, Werkstudentenjobs und Teilzeitstellen.
    </p>

    <form
      action="https://formspree.io/f/xredkbnw"
      method="POST"
      enctype="multipart/form-data"
    >

      <input
        type="text"
        name="vorname"
        placeholder="Vorname"
        required
      >

      <input
        type="text"
        name="nachname"
        placeholder="Nachname"
        required
      >

      <input
        type="email"
        name="email"
        placeholder="E-Mail"
        required
      >

      <input
        type="text"
        name="studiengang"
        placeholder="Studiengang"
        required
      >

      <input
        type="text"
        name="universitaet"
        placeholder="Universität"
      >

      <input
        type="text"
        name="linkedin"
        placeholder="LinkedIn Profil (optional)"
      >

      <select
        name="jobtyp"
        required
      >

        <option value="">
          Was suchst du?
        </option>

        <option>
          Werkstudentenjob
        </option>

        <option>
          Praktikum
        </option>

        <option>
          Teilzeitjob
        </option>

      </select>

      <input
        type="text"
        name="skills"
        placeholder="Skills (z.B. Python, Excel, Marketing)"
      >

      <textarea
        name="beschreibung"
        placeholder="Erzähl kurz etwas über dich..."
      ></textarea>

      <label class="label">
        Lebenslauf hochladen
      </label>

      <input
        type="file"
        name="cv"
      >

      <button type="submit">
        Kostenlos bewerben
      </button>

    </form>

  </div>

</body>

</html>
